<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mail Center — BorealisMark Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--bg-raised:#111113;--bg-card:#141416;--bg-hover:#1a1a1e;--bg-input:#0f0f12;
  --border:#222226;--border-light:#2a2a30;--border-focus:#3a3a42;
  --gold:#d4a853;--gold-bright:#f0c95c;--gold-dim:rgba(212,168,83,0.08);--gold-border:rgba(212,168,83,0.2);
  --emerald:#34d399;--emerald-dim:rgba(52,211,153,0.08);--emerald-border:rgba(52,211,153,0.15);
  --red:#f87171;--red-dim:rgba(248,113,113,0.06);--red-border:rgba(248,113,113,0.15);
  --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.08);--blue-border:rgba(96,165,250,0.15);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.08);
  --text-primary:#fafafa;--text-secondary:#a1a1aa;--text-muted:#71717a;--text-faint:#52525b;
  --radius:8px;--radius-sm:6px;--radius-xs:4px;
  --shadow:0 1px 3px rgba(0,0,0,0.3),0 1px 2px rgba(0,0,0,0.2);
  --shadow-lg:0 4px 20px rgba(0,0,0,0.4);
  --sidebar-w:240px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text-primary);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-faint)}

/* ─── Auth Gate ─── */
#auth-gate{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)}
.auth-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:12px;padding:48px 40px;max-width:380px;width:100%;text-align:center;border-top:3px solid var(--gold)}
.auth-card .logo{font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px}
.auth-card .logo span:first-child{color:var(--text-muted)}
.auth-card .logo span:last-child{color:var(--gold)}
.auth-card .subtitle{color:var(--text-muted);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:32px}
.auth-card input{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text-primary);font-size:14px;margin-bottom:12px;outline:none;transition:border-color .15s}
.auth-card input:focus{border-color:var(--gold)}
.auth-card input::placeholder{color:var(--text-faint)}
.pw-wrapper{position:relative;width:100%;margin-bottom:12px}
.pw-wrapper input{margin-bottom:0;padding-right:44px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-faint);cursor:pointer;padding:4px;display:flex;align-items:center;transition:color .15s}
.pw-toggle:hover{color:var(--text-secondary)}
.remember-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;justify-content:flex-start}
.remember-row input[type="checkbox"]{width:14px;height:14px;accent-color:var(--gold);cursor:pointer;margin:0}
.remember-row label{font-size:12px;color:var(--text-muted);cursor:pointer;user-select:none}
.auth-card .auth-btn{width:100%;background:var(--gold);color:var(--bg);border:none;border-radius:var(--radius-sm);padding:12px;font-weight:600;font-size:14px;cursor:pointer;transition:background .15s;margin-top:4px}
.auth-card .auth-btn:hover{background:var(--gold-bright)}
.auth-card .back-link{display:inline-flex;align-items:center;gap:6px;margin-top:20px;color:var(--text-faint);font-size:12px;text-decoration:none;transition:color .15s}
.auth-card .back-link:hover{color:var(--text-secondary)}
.auth-card .back-link svg{width:14px;height:14px}
.auth-card .error{color:var(--red);font-size:12px;margin-top:12px;display:none}

/* ─── App Layout ─── */
#app{display:none;height:100vh;width:100vw}
.app-layout{display:flex;height:100%}

/* ─── Sidebar ─── */
.sidebar{width:var(--sidebar-w);background:var(--bg-raised);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo{font-size:18px;font-weight:800;letter-spacing:-0.3px}
.sidebar-logo span:first-child{color:var(--text-muted)}
.sidebar-logo span:last-child{color:var(--gold)}
.sidebar-badge{display:inline-flex;align-items:center;gap:4px;margin-left:8px;background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:10px;padding:2px 8px;font-size:10px;font-weight:600;color:var(--gold);letter-spacing:0.5px;text-transform:uppercase}
.sidebar-subtitle{color:var(--text-faint);font-size:11px;letter-spacing:1px;text-transform:uppercase;margin-top:6px}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0}
.nav-section{padding:0 12px;margin-bottom:16px}
.nav-section-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-faint);padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-secondary);font-size:13px;font-weight:500;transition:all .12s;position:relative}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-item.active{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.nav-item .icon{width:18px;height:18px;opacity:.7;flex-shrink:0}
.nav-item.active .icon{opacity:1}
.nav-item .badge{margin-left:auto;background:var(--gold);color:var(--bg);font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;min-width:18px;text-align:center}
.sidebar-compose{padding:16px;border-top:1px solid var(--border)}
.compose-btn{width:100%;background:var(--gold);color:var(--bg);border:none;border-radius:var(--radius-sm);padding:10px;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.compose-btn:hover{background:var(--gold-bright)}
.compose-btn svg{width:16px;height:16px}

/* ─── Main Content ─── */
.main-content{flex:1;display:flex;flex-direction:column;min-width:0}
.toolbar{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg-raised);flex-shrink:0}
.toolbar-left{display:flex;align-items:center;gap:8px}
.toolbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.search-box{display:flex;align-items:center;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 12px;flex:1;max-width:400px;transition:border-color .15s}
.search-box:focus-within{border-color:var(--gold)}
.search-box svg{width:16px;height:16px;color:var(--text-faint);flex-shrink:0}
.search-box input{border:none;background:transparent;color:var(--text-primary);font-size:13px;padding:8px 10px;outline:none;width:100%}
.search-box input::placeholder{color:var(--text-faint)}
.tb-btn{background:transparent;border:1px solid var(--border);border-radius:var(--radius-xs);padding:6px 10px;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;transition:all .12s}
.tb-btn:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-light)}
.tb-btn.active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-border)}
.tb-btn svg{width:14px;height:14px}

/* ─── Split View ─── */
.split-view{display:flex;flex:1;min-height:0}
.email-list{width:380px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;background:var(--bg)}
.email-list-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-faint);gap:12px;padding:40px}
.email-list-empty svg{width:48px;height:48px;opacity:.3}
.email-item{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative}
.email-item:hover{background:var(--bg-hover)}
.email-item.active{background:var(--gold-dim);border-left:3px solid var(--gold)}
.email-item.unread{background:var(--bg-raised)}
.email-item.unread .ei-sender{color:var(--text-primary);font-weight:600}
.email-item.unread .ei-subject{color:var(--text-primary)}
.email-item .ei-checkbox{flex-shrink:0;margin-top:2px}
.email-item .ei-checkbox input{width:14px;height:14px;accent-color:var(--gold);cursor:pointer}
.ei-body{flex:1;min-width:0}
.ei-top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.ei-sender{font-size:13px;font-weight:500;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.ei-time{font-size:11px;color:var(--text-faint);flex-shrink:0;font-family:'JetBrains Mono',monospace}
.ei-subject{font-size:13px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.ei-snippet{font-size:12px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ei-star{position:absolute;right:12px;top:14px;cursor:pointer;color:var(--text-faint);transition:color .12s}
.ei-star:hover,.ei-star.starred{color:var(--gold)}
.ei-labels{display:flex;gap:4px;margin-top:4px}
.ei-label{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:500}
.ei-direction{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;margin-right:4px}
.ei-direction.inbound{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-border)}
.ei-direction.outbound{background:var(--emerald-dim);color:var(--emerald);border:1px solid var(--emerald-border)}

/* ─── Email Detail ─── */
.email-detail{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}
.email-detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-faint);gap:12px;padding:40px}
.email-detail-empty svg{width:64px;height:64px;opacity:.2}
.email-detail-empty p{font-size:14px}
.ed-header{padding:24px 28px 16px;border-bottom:1px solid var(--border);background:var(--bg-raised)}
.ed-subject{font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:12px;line-height:1.3}
.ed-meta{display:flex;align-items:flex-start;gap:12px}
.ed-avatar{width:40px;height:40px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:var(--gold);flex-shrink:0}
.ed-meta-info{flex:1;min-width:0}
.ed-from{font-size:14px;font-weight:600;color:var(--text-primary)}
.ed-from-email{font-size:12px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.ed-to{font-size:12px;color:var(--text-faint);margin-top:2px}
.ed-date{font-size:12px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;flex-shrink:0;margin-top:2px}
.ed-actions{display:flex;gap:6px;margin-top:12px}
.ed-actions .tb-btn{font-size:12px;padding:6px 12px}
.ed-body{padding:28px;flex:1;font-size:14px;line-height:1.7;color:var(--text-secondary)}
.ed-body p{margin-bottom:16px}
.ed-thread{border-top:1px solid var(--border);padding:20px 28px}
.ed-thread-header{font-size:12px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.thread-msg{padding:16px;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px}
.thread-msg.outbound{border-left:3px solid var(--gold)}
.thread-msg.inbound{border-left:3px solid var(--blue)}
.thread-msg-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.thread-msg-from{font-size:12px;font-weight:600;color:var(--text-primary)}
.thread-msg-date{font-size:11px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;margin-left:auto}
.thread-msg-body{font-size:13px;color:var(--text-secondary);line-height:1.6;white-space:pre-wrap}

/* ─── Reply Box ─── */
.reply-box{border-top:1px solid var(--border);padding:16px 28px 20px;background:var(--bg-raised);flex-shrink:0}
.reply-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.reply-header span{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}
.reply-to{font-size:12px;color:var(--text-faint);font-family:'JetBrains Mono',monospace}
.reply-textarea{width:100%;min-height:100px;max-height:300px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text-primary);font-size:14px;font-family:'Inter',sans-serif;line-height:1.6;resize:vertical;outline:none;transition:border-color .15s}
.reply-textarea:focus{border-color:var(--gold)}
.reply-textarea::placeholder{color:var(--text-faint)}
.reply-actions{display:flex;align-items:center;gap:10px;margin-top:10px}
.reply-send{background:var(--gold);color:var(--bg);border:none;border-radius:var(--radius-sm);padding:8px 20px;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s}
.reply-send:hover{background:var(--gold-bright)}
.reply-send:disabled{opacity:.5;cursor:not-allowed}
.reply-send svg{width:14px;height:14px}

/* ─── Compose Modal ─── */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.visible{display:flex}
.compose-modal{background:var(--bg-raised);border:1px solid var(--border);border-radius:12px;width:640px;max-height:80vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);border-top:3px solid var(--gold)}
.cm-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.cm-title{font-size:15px;font-weight:600;color:var(--text-primary)}
.cm-close{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;border-radius:4px;transition:color .12s}
.cm-close:hover{color:var(--text-primary)}
.cm-close svg{width:20px;height:20px}
.cm-body{padding:16px 20px;flex:1;overflow-y:auto}
.cm-field{margin-bottom:12px}
.cm-field label{display:block;font-size:11px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.cm-field input,.cm-field textarea{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-xs);padding:10px 14px;color:var(--text-primary);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.cm-field input:focus,.cm-field textarea:focus{border-color:var(--gold)}
.cm-field input::placeholder,.cm-field textarea::placeholder{color:var(--text-faint)}
.cm-field textarea{min-height:200px;resize:vertical;line-height:1.6}
.cm-footer{display:flex;align-items:center;gap:10px;padding:12px 20px;border-top:1px solid var(--border)}
.cm-send{background:var(--gold);color:var(--bg);border:none;border-radius:var(--radius-sm);padding:10px 24px;font-weight:600;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}
.cm-send:hover{background:var(--gold-bright)}
.cm-send:disabled{opacity:.5;cursor:not-allowed}
.cm-discard{background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 16px;color:var(--text-secondary);cursor:pointer;font-size:13px;transition:all .12s}
.cm-discard:hover{background:var(--bg-hover);color:var(--text-primary)}

/* ─── Loader ─── */
.loader{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text-faint)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Toast ─── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;color:var(--text-primary);font-size:13px;box-shadow:var(--shadow-lg);z-index:2000;transform:translateY(100px);opacity:0;transition:all .3s ease}
.toast.visible{transform:translateY(0);opacity:1}
.toast.success{border-left:3px solid var(--emerald)}
.toast.error{border-left:3px solid var(--red)}
</style>
</head>
<body>

<!-- ─── Auth Gate ─── -->
<div id="auth-gate">
  <div class="auth-card">
    <div class="logo"><span>Borealis</span><span>Mark</span></div>
    <div class="subtitle">Admin Mail Center</div>
    <input type="email" id="auth-email" placeholder="Admin email" autocomplete="email">
    <div class="pw-wrapper">
      <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password">
      <button type="button" class="pw-toggle" onclick="togglePwVisibility()" aria-label="Toggle password visibility">
        <svg id="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg id="eye-off-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
    <div class="remember-row">
      <input type="checkbox" id="auth-remember">
      <label for="auth-remember">Remember me</label>
    </div>
    <button class="auth-btn" onclick="doLogin()">Sign In</button>
    <div class="error" id="auth-error"></div>
    <a href="https://borealisterminal.com" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
      Back to Borealis Terminal
    </a>
  </div>
</div>

<!-- ─── Main App ─── -->
<div id="app">
  <div class="app-layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo"><span>Borealis</span><span>Mark</span><span class="sidebar-badge">Admin</span></div>
        <div class="sidebar-subtitle">Mail Center</div>
      </div>
      <div class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-label">Mailbox</div>
          <div class="nav-item active" data-folder="inbox" onclick="switchFolder('inbox')">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,7 12,13 2,7"/></svg>
            Inbox <span class="badge" id="badge-inbox" style="display:none">0</span>
          </div>
          <div class="nav-item" data-folder="starred" onclick="switchFolder('starred')">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
            Starred <span class="badge" id="badge-starred" style="display:none">0</span>
          </div>
          <div class="nav-item" data-folder="sent" onclick="switchFolder('sent')">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
            Sent <span class="badge" id="badge-sent" style="display:none">0</span>
          </div>
          <div class="nav-item" data-folder="archived" onclick="switchFolder('archived')">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21,8 21,21 3,21 3,8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
            Archive <span class="badge" id="badge-archived" style="display:none">0</span>
          </div>
          <div class="nav-item" data-folder="trash" onclick="switchFolder('trash')">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2v2"/></svg>
            Trash <span class="badge" id="badge-trash" style="display:none">0</span>
          </div>
        </div>
        <div class="nav-section" id="labels-section">
          <div class="nav-section-label">Labels</div>
        </div>
      </div>
      <div class="sidebar-compose">
        <button class="compose-btn" onclick="openCompose()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Compose
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="toolbar">
        <div class="toolbar-left">
          <label class="tb-btn" title="Select all"><input type="checkbox" id="select-all" onchange="toggleSelectAll()" style="accent-color:var(--gold);cursor:pointer"></label>
          <button class="tb-btn" onclick="bulkAction('read')" title="Mark read"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22,12 A10,10 0 1 1 12,2"/><polyline points="22,4 12,14.01 9,11.01"/></svg></button>
          <button class="tb-btn" onclick="bulkAction('archive')" title="Archive"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21,8 21,21 3,21 3,8"/><rect x="1" y="3" width="22" height="5"/></svg></button>
          <button class="tb-btn" onclick="bulkAction('trash')" title="Trash"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2v2"/></svg></button>
          <button class="tb-btn" onclick="refreshList()" title="Refresh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><path d="M20.49,15a9,9,0,1,1-2.12-9.36L23,10"/></svg></button>
        </div>
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search emails..." onkeyup="handleSearch(event)">
        </div>
        <div class="toolbar-right">
          <span id="page-info" style="font-size:11px;color:var(--text-faint);font-family:'JetBrains Mono',monospace"></span>
          <button class="tb-btn" onclick="prevPage()" id="btn-prev" disabled>&larr;</button>
          <button class="tb-btn" onclick="nextPage()" id="btn-next" disabled>&rarr;</button>
        </div>
      </div>

      <div class="split-view">
        <!-- Email List -->
        <div class="email-list" id="email-list">
          <div class="loader" id="list-loader"><div class="spinner"></div> Loading...</div>
        </div>

        <!-- Email Detail -->
        <div class="email-detail" id="email-detail">
          <div class="email-detail-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,7 12,13 2,7"/></svg>
            <p>Select an email to read</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ─── Compose Modal ─── -->
<div class="modal-overlay" id="compose-modal">
  <div class="compose-modal">
    <div class="cm-header">
      <span class="cm-title">New Message</span>
      <button class="cm-close" onclick="closeCompose()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="cm-body">
      <div class="cm-field"><label>To</label><input type="text" id="compose-to" placeholder="recipient@example.com"></div>
      <div class="cm-field"><label>CC</label><input type="text" id="compose-cc" placeholder="Optional"></div>
      <div class="cm-field"><label>Subject</label><input type="text" id="compose-subject" placeholder="Subject"></div>
      <div class="cm-field"><label>Message</label><textarea id="compose-body" placeholder="Write your message..."></textarea></div>
    </div>
    <div class="cm-footer">
      <button class="cm-send" onclick="sendCompose()" id="compose-send-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
        Send
      </button>
      <button class="cm-discard" onclick="closeCompose()">Discard</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? window.location.origin
  : 'https://borealismark-api.onrender.com';
let token = '';
let currentFolder = 'inbox';
let currentSearch = '';
let currentOffset = 0;
let currentTotal = 0;
let selectedEmail = null;
let selectedIds = new Set();
const LIMIT = 50;

// ─── Auth ───────────────────────────────────────────────────────────────────

function togglePwVisibility() {
  const inp = document.getElementById('auth-password');
  const eyeOn = document.getElementById('eye-icon');
  const eyeOff = document.getElementById('eye-off-icon');
  if (inp.type === 'password') {
    inp.type = 'text'; eyeOn.style.display = 'none'; eyeOff.style.display = 'block';
  } else {
    inp.type = 'password'; eyeOn.style.display = 'block'; eyeOff.style.display = 'none';
  }
}

function saveToken(t) {
  const remember = document.getElementById('auth-remember').checked;
  if (remember) { localStorage.setItem('bm_admin_token', t); }
  sessionStorage.setItem('bm_admin_token', t);
}

function clearToken() {
  token = '';
  sessionStorage.removeItem('bm_admin_token');
  localStorage.removeItem('bm_admin_token');
}

async function doLogin() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');

  if (!email || !pass) { errEl.textContent = 'Please enter credentials'; errEl.style.display = 'block'; return; }

  try {
    const r = await fetch(`${API}/v1/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass }),
    });
    const data = await r.json();

    if (!r.ok || !data.success) {
      errEl.textContent = data.error || 'Login failed'; errEl.style.display = 'block'; return;
    }

    token = data.data?.token || data.token;
    if (!token) { errEl.textContent = 'No token received'; errEl.style.display = 'block'; return; }

    // Verify admin status
    const me = await apiFetch('/v1/admin/mail/stats');
    if (!me.success) { errEl.textContent = 'Admin access required'; errEl.style.display = 'block'; token = ''; return; }

    saveToken(token);
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } catch (e) {
    errEl.textContent = 'Connection failed'; errEl.style.display = 'block';
  }
}

// Auto-login from session or remembered token
(function() {
  const saved = sessionStorage.getItem('bm_admin_token') || localStorage.getItem('bm_admin_token');
  if (saved) {
    token = saved;
    fetch(`${API}/v1/admin/mail/stats`, { headers: { 'Authorization': `Bearer ${token}` } })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          sessionStorage.setItem('bm_admin_token', token);
          document.getElementById('auth-gate').style.display = 'none';
          document.getElementById('app').style.display = 'block';
          init();
        } else { clearToken(); }
      }).catch(() => { clearToken(); });
  }
})();

document.getElementById('auth-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ─── API Helper ─────────────────────────────────────────────────────────────

async function apiFetch(path, opts = {}) {
  const r = await fetch(`${API}${path}`, {
    ...opts,
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...opts.headers },
  });
  return r.json();
}

// ─── Init ───────────────────────────────────────────────────────────────────

async function init() {
  loadStats();
  loadLabels();
  loadList();
}

// ─── Stats ──────────────────────────────────────────────────────────────────

async function loadStats() {
  try {
    const data = await apiFetch('/v1/admin/mail/stats');
    if (!data.success) return;
    const s = data.data;
    setBadge('inbox', s.unread);
    setBadge('starred', s.starred);
    setBadge('sent', s.sent);
    setBadge('archived', s.archived);
    setBadge('trash', s.trash);
  } catch(e) {}
}

function setBadge(folder, count) {
  const el = document.getElementById(`badge-${folder}`);
  if (!el) return;
  if (count > 0) { el.textContent = count > 99 ? '99+' : count; el.style.display = 'inline'; }
  else { el.style.display = 'none'; }
}

// ─── Labels ─────────────────────────────────────────────────────────────────

async function loadLabels() {
  try {
    const data = await apiFetch('/v1/admin/mail/labels');
    if (!data.success) return;
    const sec = document.getElementById('labels-section');
    // Keep section label
    sec.innerHTML = '<div class="nav-section-label">Labels</div>';
    data.data.labels.forEach(l => {
      const el = document.createElement('div');
      el.className = 'nav-item';
      el.dataset.label = l.name;
      el.onclick = () => switchLabel(l.name);
      el.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:${l.color};flex-shrink:0"></span> ${l.name}`;
      sec.appendChild(el);
    });
  } catch(e) {}
}

// ─── Folder Navigation ─────────────────────────────────────────────────────

function switchFolder(folder) {
  currentFolder = folder;
  currentSearch = '';
  currentOffset = 0;
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItem = document.querySelector(`.nav-item[data-folder="${folder}"]`);
  if (navItem) navItem.classList.add('active');
  selectedEmail = null;
  showDetailEmpty();
  loadList();
}

function switchLabel(name) {
  currentFolder = 'all';
  currentSearch = '';
  currentOffset = 0;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItem = document.querySelector(`.nav-item[data-label="${name}"]`);
  if (navItem) navItem.classList.add('active');
  selectedEmail = null;
  showDetailEmpty();
  loadList(name);
}

// ─── Email List ─────────────────────────────────────────────────────────────

async function loadList(label) {
  const list = document.getElementById('email-list');
  list.innerHTML = '<div class="loader"><div class="spinner"></div> Loading...</div>';

  let url = `/v1/admin/mail/messages?folder=${currentFolder}&limit=${LIMIT}&offset=${currentOffset}`;
  if (currentSearch) url += `&search=${encodeURIComponent(currentSearch)}`;
  if (label) url += `&label=${encodeURIComponent(label)}`;

  try {
    const data = await apiFetch(url);
    if (!data.success) { list.innerHTML = '<div class="email-list-empty"><p>Failed to load</p></div>'; return; }

    currentTotal = data.data.total;
    updatePagination();

    if (!data.data.messages.length) {
      list.innerHTML = `<div class="email-list-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,7 12,13 2,7"/></svg>
        <p>No emails here</p></div>`;
      return;
    }

    list.innerHTML = '';
    data.data.messages.forEach(m => {
      const el = document.createElement('div');
      el.className = `email-item${m.is_read ? '' : ' unread'}${selectedEmail === m.id ? ' active' : ''}`;
      el.onclick = (e) => { if (!e.target.closest('.ei-checkbox') && !e.target.closest('.ei-star')) openEmail(m.id); };

      const time = formatTime(m.created_at);
      const labels = parseLabels(m.labels);
      const dir = m.direction === 'inbound' ? '<span class="ei-direction inbound">IN</span>' : '<span class="ei-direction outbound">OUT</span>';
      const sender = m.direction === 'inbound' ? (m.from_name || m.from_address) : `To: ${m.to_address}`;

      el.innerHTML = `
        <div class="ei-checkbox"><input type="checkbox" ${selectedIds.has(m.id)?'checked':''} onchange="toggleSelect('${m.id}',this.checked)"></div>
        <div class="ei-body">
          <div class="ei-top"><span class="ei-sender">${dir}${esc(sender)}</span><span class="ei-time">${time}</span></div>
          <div class="ei-subject">${esc(m.subject)}</div>
          <div class="ei-snippet">${esc(m.snippet || '')}</div>
          ${labels.length ? `<div class="ei-labels">${labels.map(l=>`<span class="ei-label" style="background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)">${esc(l)}</span>`).join('')}</div>` : ''}
        </div>
        <div class="ei-star ${m.is_starred?'starred':''}" onclick="toggleStar('${m.id}',event)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="${m.is_starred?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
        </div>`;
      list.appendChild(el);
    });
  } catch(e) {
    list.innerHTML = '<div class="email-list-empty"><p>Connection error</p></div>';
  }
}

// ─── Email Detail ───────────────────────────────────────────────────────────

async function openEmail(id) {
  selectedEmail = id;
  // Highlight in list
  document.querySelectorAll('.email-item').forEach(el => el.classList.remove('active'));
  const items = document.querySelectorAll('.email-item');
  items.forEach(el => { if (el.querySelector(`input[onchange*="${id}"]`)) el.classList.add('active'); });

  const detail = document.getElementById('email-detail');
  detail.innerHTML = '<div class="loader"><div class="spinner"></div> Loading...</div>';

  try {
    const data = await apiFetch(`/v1/admin/mail/messages/${id}`);
    if (!data.success) { detail.innerHTML = '<div class="email-detail-empty"><p>Failed to load email</p></div>'; return; }

    const e = data.data.email;
    const thread = data.data.thread || [];
    const avatar = (e.from_name || e.from_address || '?')[0].toUpperCase();
    const date = new Date(e.created_at).toLocaleString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });
    const replyTo = e.direction === 'inbound' ? e.from_address : e.to_address;

    // Mark as read in list
    document.querySelectorAll('.email-item').forEach(el => {
      if (el.querySelector(`input[onchange*="${id}"]`)) el.classList.remove('unread');
    });

    let threadHtml = '';
    if (thread.length > 1) {
      threadHtml = `<div class="ed-thread"><div class="ed-thread-header">Conversation (${thread.length} messages)</div>`;
      thread.forEach(msg => {
        if (msg.id === e.id) return;
        const mDate = new Date(msg.created_at).toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
        threadHtml += `<div class="thread-msg ${msg.direction}">
          <div class="thread-msg-header">
            <span class="thread-msg-from">${esc(msg.from_name || msg.from_address)}</span>
            <span class="thread-msg-date">${mDate}</span>
          </div>
          <div class="thread-msg-body">${esc(msg.body_text)}</div>
        </div>`;
      });
      threadHtml += '</div>';
    }

    detail.innerHTML = `
      <div class="ed-header">
        <div class="ed-subject">${esc(e.subject)}</div>
        <div class="ed-meta">
          <div class="ed-avatar">${avatar}</div>
          <div class="ed-meta-info">
            <div class="ed-from">${esc(e.from_name || e.from_address)}</div>
            <div class="ed-from-email">&lt;${esc(e.from_address)}&gt;</div>
            <div class="ed-to">To: ${esc(e.to_address)}${e.cc ? ` | CC: ${esc(e.cc)}` : ''}</div>
          </div>
          <div class="ed-date">${date}</div>
        </div>
        <div class="ed-actions">
          <button class="tb-btn" onclick="replyToEmail('${id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,17 4,12 9,7"/><path d="M20,18v-2a4,4,0,0,0-4-4H4"/></svg> Reply</button>
          <button class="tb-btn" onclick="forwardEmail('${id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15,17 20,12 15,7"/><path d="M4,18v-2a4,4,0,0,0,4-4h12"/></svg> Forward</button>
          <button class="tb-btn" onclick="archiveEmail('${id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21,8 21,21 3,21 3,8"/><rect x="1" y="3" width="22" height="5"/></svg> Archive</button>
          <button class="tb-btn" onclick="trashEmail('${id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2v2"/></svg> Trash</button>
        </div>
      </div>
      <div class="ed-body">${renderBody(e.body_html || e.body_text)}</div>
      ${threadHtml}
      <div class="reply-box">
        <div class="reply-header"><span>Reply</span><span class="reply-to">to ${esc(replyTo)}</span></div>
        <textarea class="reply-textarea" id="reply-body" placeholder="Write your reply..."></textarea>
        <div class="reply-actions">
          <button class="reply-send" onclick="sendReply('${id}')" id="reply-send-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
            Send Reply
          </button>
        </div>
      </div>`;

    loadStats(); // Refresh unread counts
  } catch(e) {
    detail.innerHTML = '<div class="email-detail-empty"><p>Failed to load</p></div>';
  }
}

function showDetailEmpty() {
  document.getElementById('email-detail').innerHTML = `
    <div class="email-detail-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,7 12,13 2,7"/></svg>
      <p>Select an email to read</p>
    </div>`;
}

// ─── Actions ────────────────────────────────────────────────────────────────

async function sendReply(id) {
  const body = document.getElementById('reply-body')?.value?.trim();
  if (!body) return;

  const btn = document.getElementById('reply-send-btn');
  btn.disabled = true; btn.textContent = 'Sending...';

  try {
    const data = await apiFetch(`/v1/admin/mail/messages/${id}/reply`, {
      method: 'POST', body: JSON.stringify({ body }),
    });
    if (data.success) {
      toast('Reply sent', 'success');
      document.getElementById('reply-body').value = '';
      openEmail(id); // Refresh thread
    } else {
      toast(data.error || 'Failed to send', 'error');
    }
  } catch(e) {
    toast('Connection error', 'error');
  }
  btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg> Send Reply';
}

async function toggleStar(id, event) {
  event.stopPropagation();
  await apiFetch(`/v1/admin/mail/messages/${id}/star`, { method: 'PUT' });
  loadList(); loadStats();
}

async function archiveEmail(id) {
  await apiFetch(`/v1/admin/mail/messages/${id}/archive`, { method: 'PUT' });
  toast('Archived', 'success');
  selectedEmail = null; showDetailEmpty(); loadList(); loadStats();
}

async function trashEmail(id) {
  await apiFetch(`/v1/admin/mail/messages/${id}/trash`, { method: 'PUT' });
  toast('Moved to trash', 'success');
  selectedEmail = null; showDetailEmpty(); loadList(); loadStats();
}

async function forwardEmail(id) {
  const to = prompt('Forward to (email address):');
  if (!to) return;
  const body = prompt('Add a note (optional):') || '';
  const data = await apiFetch(`/v1/admin/mail/messages/${id}/forward`, {
    method: 'POST', body: JSON.stringify({ to, body }),
  });
  if (data.success) toast('Forwarded', 'success'); else toast('Failed', 'error');
}

function replyToEmail(id) {
  document.getElementById('reply-body')?.focus();
}

// ─── Compose ────────────────────────────────────────────────────────────────

function openCompose() {
  document.getElementById('compose-modal').classList.add('visible');
  document.getElementById('compose-to').focus();
}

function closeCompose() {
  document.getElementById('compose-modal').classList.remove('visible');
  ['compose-to','compose-cc','compose-subject','compose-body'].forEach(id => document.getElementById(id).value = '');
}

async function sendCompose() {
  const to = document.getElementById('compose-to').value.trim();
  const cc = document.getElementById('compose-cc').value.trim();
  const subject = document.getElementById('compose-subject').value.trim();
  const body = document.getElementById('compose-body').value.trim();

  if (!to || !subject || !body) { toast('Fill in To, Subject, and Message', 'error'); return; }

  const btn = document.getElementById('compose-send-btn');
  btn.disabled = true;

  try {
    const data = await apiFetch('/v1/admin/mail/compose', {
      method: 'POST', body: JSON.stringify({ to, cc, subject, body }),
    });
    if (data.success) {
      toast('Email sent', 'success');
      closeCompose();
      loadList(); loadStats();
    } else {
      toast(data.error || 'Failed to send', 'error');
    }
  } catch(e) {
    toast('Connection error', 'error');
  }
  btn.disabled = false;
}

// ─── Bulk Actions ───────────────────────────────────────────────────────────

function toggleSelect(id, checked) {
  if (checked) selectedIds.add(id); else selectedIds.delete(id);
}

function toggleSelectAll() {
  const checked = document.getElementById('select-all').checked;
  document.querySelectorAll('.ei-checkbox input').forEach(cb => {
    cb.checked = checked;
    const id = cb.getAttribute('onchange').match(/'([^']+)'/)?.[1];
    if (id) { if (checked) selectedIds.add(id); else selectedIds.delete(id); }
  });
}

async function bulkAction(action) {
  if (selectedIds.size === 0) { toast('Select emails first', 'error'); return; }
  await apiFetch('/v1/admin/mail/bulk', {
    method: 'POST', body: JSON.stringify({ ids: [...selectedIds], action }),
  });
  selectedIds.clear();
  document.getElementById('select-all').checked = false;
  toast(`${action} applied`, 'success');
  loadList(); loadStats();
}

// ─── Search ─────────────────────────────────────────────────────────────────

let searchTimeout;
function handleSearch(e) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    currentSearch = e.target.value.trim();
    currentOffset = 0;
    loadList();
  }, 300);
}

// ─── Pagination ─────────────────────────────────────────────────────────────

function updatePagination() {
  const start = currentOffset + 1;
  const end = Math.min(currentOffset + LIMIT, currentTotal);
  document.getElementById('page-info').textContent = currentTotal > 0 ? `${start}-${end} of ${currentTotal}` : '0 emails';
  document.getElementById('btn-prev').disabled = currentOffset === 0;
  document.getElementById('btn-next').disabled = currentOffset + LIMIT >= currentTotal;
}

function prevPage() { currentOffset = Math.max(0, currentOffset - LIMIT); loadList(); }
function nextPage() { currentOffset += LIMIT; loadList(); }

function refreshList() { loadList(); loadStats(); toast('Refreshed', 'success'); }

// ─── Helpers ────────────────────────────────────────────────────────────────

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now.getTime() - d.getTime();
  if (diff < 86400000 && d.getDate() === now.getDate()) return d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  if (diff < 604800000) return d.toLocaleDateString('en-US', { weekday:'short' });
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function parseLabels(s) { try { return JSON.parse(s || '[]'); } catch { return []; } }

function renderBody(content) {
  if (!content) return '<p style="color:var(--text-faint)">No content</p>';
  // If it looks like HTML, render it in a sandboxed way
  if (content.includes('<') && content.includes('>') && (content.includes('<p') || content.includes('<div') || content.includes('<br'))) {
    return `<div style="max-width:100%;overflow-x:auto">${content}</div>`;
  }
  return `<div style="white-space:pre-wrap">${esc(content)}</div>`;
}

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} visible`;
  setTimeout(() => el.classList.remove('visible'), 3000);
}
